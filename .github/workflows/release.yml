name: Release

# Builds release artifacts for both clients and, on a v* tag or published
# Release, attaches them:
#   * Android — release APK (unsigned)
#   * Windows — self-contained win-x64 portable .zip
#
# The HcaloryTest console harness is not part of the product and is not built.

on:
  push:
    tags: [ 'v*' ]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the build (e.g. 0.2.99)'
        required: true
        default: '0.2.99'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android:
    name: Android · release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Collect APK
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          find app/build/outputs/apk/release -name '*.apk' -exec cp {} "$GITHUB_WORKSPACE/dist/" \;
          ls -l "$GITHUB_WORKSPACE/dist"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: dist/*.apk
          if-no-files-found: error

  windows:
    name: Windows · publish
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained (win-x64)
        run: >
          dotnet publish windows/src/Ember/Ember.csproj
          -c Release -r win-x64 --self-contained true -p:Platform=x64
          -o windows/publish/win-x64

      - name: Zip portable build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path windows/publish/win-x64/* -DestinationPath dist/Ember-win-x64.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: dist/Ember-win-x64.zip
          if-no-files-found: error

  attach:
    name: Attach assets to release
    needs: [android, windows]
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Create / update the GitHub Release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.apk
            artifacts/**/*.zip
