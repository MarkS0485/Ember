name: CI

# Compile-validation only: proves both clients still build on every push / PR.
# No tests exist yet, and no secrets are needed (the Android *debug* build is
# unsigned; release signing only kicks in when a keystore is present locally).
# The HcaloryTest console harness is not in the .sln and is left out of CI.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# A newer push to the same branch cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  android:
    name: Android · assembleDebug
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

  windows:
    name: Windows · dotnet build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build (Debug | x64)
        run: dotnet build windows/src/TsgbHeater/TsgbHeater.csproj -c Debug -p:Platform=x64
